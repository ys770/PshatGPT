name = "pshatgpt-proxy"
main = "src/index.js"
compatibility_date = "2024-10-01"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[[kv_namespaces]]
binding = "PSHATGPT"
id = "d00e1ca559124da0b3c506c41112afc8"

[vars]
# Per-device (UUID) daily cap — each browser gets this many.
DEVICE_DAILY = "10"
# Per-IP daily cap — safety net for abuse on one network.
FREE_TIER_DAILY = "25"
# Comma-separated allowed origins. "*" lets anyone call your worker.
ALLOWED_ORIGINS = "https://ys770.github.io"

# Secret (set via `wrangler secret put ANTHROPIC_API_KEY`):
#   ANTHROPIC_API_KEY
